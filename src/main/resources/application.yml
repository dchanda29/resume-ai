spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/resumeai}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-key-change-this-in-production-min-32-chars}
    expiration-ms: 86400000  # 24 hours

  gemini:
    api-key: ${GEMINI_API_KEY:your-gemini-api-key-here}
    api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
